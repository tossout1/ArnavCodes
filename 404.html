<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - Page Not Found | ArnavCodes Club</title>
  <meta name="description" content="The page you requested could not be found. Return to ArnavCodes Club homepage or explore other coding resources." />
  <link rel="icon" type="image/x-icon" href="./favicon.ico?v=2" />
  <style>
    :root {
      --bg: #0b1220;
      --panel: #111c33;
      --panel-2: #172544;
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent-2: #7dd3fc;
      --border: rgba(125, 211, 252, 0.25);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #172544 0%, var(--bg) 55%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(92vw, 760px);
      background: rgba(17, 28, 51, 0.95);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 28px;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.28);
      text-align: center;
    }

    .badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(56, 189, 248, 0.14);
      color: var(--accent-2);
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    h1 {
      font-size: clamp(2.4rem, 6vw, 4rem);
      margin: 0 0 12px;
      color: var(--text);
    }

    p {
      margin: 0 auto 24px;
      max-width: 560px;
      color: var(--muted);
      line-height: 1.7;
      font-size: 1rem;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-top: 20px;
    }

    .btn {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn-primary {
      background: var(--accent);
      color: #07111f;
    }

    .btn-secondary {
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .mini-links {
      margin-top: 24px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .mini-links a {
      color: var(--accent-2);
      text-decoration: none;
      margin: 0 6px;
    }

    .mini-links a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">404 Error</div>
    <h1>Page not found</h1>
    <p>The page you were looking for may have moved, been removed, or never existed. Let’s get you back to the good stuff.</p>

    <div class="actions">
      <a class="btn btn-primary" href="./index.html">Back to Home</a>
      <a class="btn btn-secondary" href="./projects.html">View Projects</a>
      <a class="btn btn-secondary" href="./code.html">Explore Code Space</a>
    </div>

    <div class="mini-links">
      Or visit
      <a href="./QA.html">FAQ</a>
      <a href="./hackathons.html">Hackathons</a>
      <a href="./syllabus.html">Syllabus</a>
    </div>
  </div>
</body>
</html>

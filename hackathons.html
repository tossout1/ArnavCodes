    nav{
        padding:20px 5%;
        background:#0f172a;
        display:flex;
        justify-content:space-between;
        align-items:center;
        flex-wrap:wrap;
        gap:10px;
        border-bottom:1px solid #1f2937;
    }
    nav h2{
        margin:0;

        border-radius:10px;

        border:1px solid #1f2937;
    }

    .grid{
        display:grid;
        grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

    }

    .btn{
        display:inline-block;
        margin-top:15px;
        padding:10px 18px;
        background:#38bdf8;
        color:black;
        font-weight:bold;
        border-radius:8px;
        text-decoration:none;
    }

    .tag{
        display:inline-block;
        background:#16a34a;
        padding:4px 10px;
        border-radius:999px;
        font-size:0.8rem;
        margin-top:8px;
    }

    @media (max-width: 760px) {
        .container{
            padding:30px 4%;
        }

        nav{
            justify-content:center;
            text-align:center;
        }

        .grid{
            grid-template-columns:1fr;
        }
